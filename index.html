<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>⚔️ 同步回合制策略对抗游戏</title>
  <style>
* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; }
body { background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); min-height: 100vh; padding: 20px; }
.container { max-width: 1400px; margin: 0 auto; background: white; border-radius: 20px; padding: 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.1); }
h1 { text-align: center; color: #2c3e50; margin-bottom: 20px; font-size: 2.5rem; text-shadow: 2px 2px 4px rgba(0,0,0,0.1); }
.stage-tip, .round-counter { text-align: center; font-size: 1.3rem; font-weight: bold; margin-bottom: 25px; padding: 12px; border-radius: 10px; }
.stage-tip { background: linear-gradient(90deg, #ffebee 0%, #fff3e0 100%); color: #e74c3c; }
.round-counter { background: linear-gradient(90deg, #e3f2fd 0%, #e8f5e9 100%); color: #1976d2; }
.section { margin-bottom: 30px; }
h2 { color: #34495e; margin-bottom: 20px; font-size: 1.8rem; border-left: 5px solid #3498db; padding-left: 15px; }
.btn { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; padding: 12px 30px; font-size: 1.1rem; border-radius: 10px; cursor: pointer; transition: all 0.3s; box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4); }
.btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6); }
.btn:disabled { background: #bdc3c7; cursor: not-allowed; transform: none; box-shadow: none; }
.btn-small { padding: 8px 20px; font-size: 1rem; }/* 选角区 */
.role-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; margin-bottom: 25px; }
.role-card { background: white; border: 3px solid #e0e0e0; border-radius: 15px; padding: 15px; text-align: center; cursor: pointer; transition: all 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
.role-card:hover:not(.disabled) { transform: translateY(-5px); box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
.role-card.selected { border-color: #e74c3c; background: #ffebee; }
.role-card.disabled { cursor: not-allowed; opacity: 0.7; }
.role-avatar { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; margin-bottom: 10px; border: 3px solid #fff; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
.role-name { font-weight: bold; color: #2c3e50; font-size: 1.1rem; margin-bottom: 8px; }
.hp-display { display: flex; justify-content: center; gap: 3px; margin-bottom: 8px; }
.heart { width: 14px; height: 14px; background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path fill="%23e74c3c" d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>') center/contain no-repeat; }
.heart.half { background: linear-gradient(90deg, #e74c3c 50%, #bdc3c7 50%); -webkit-mask: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>') center/contain no-repeat; mask: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>') center/contain no-repeat; }
.heart.empty { filter: grayscale(100%); }
.energy-display { display: flex; justify-content: center; gap: 4px; margin-bottom: 5px; }
.energy { width: 16px; height: 16px; border-radius: 4px; background: #bdc3c7; transition: all 0.3s; }
.energy.filled { background: linear-gradient(135deg, #f39c12 0%, #e67e22 100%); box-shadow: 0 0 8px rgba(243, 156, 18, 0.6); }
.selected-roles { display: flex; justify-content: space-around; margin-bottom: 20px; font-size: 1.1rem; }

/* 站位区 */
.position-area { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; margin-bottom: 25px; }
.player-position { text-align: center; }
.player-position h3 { color: #2c3e50; margin-bottom: 20px; font-size: 1.4rem; }
.position-slots { display: flex; justify-content: center; gap: 20px; }
.position-slot { width: 140px; height: 180px; border: 3px dashed #bdc3c7; border-radius: 15px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: all 0.3s; background: #f8f9fa; }
.position-slot:hover { border-color: #3498db; background: #e3f2fd; }
.position-slot.filled { border-style: solid; border-color: #27ae60; background: #e8f5e9; cursor: pointer; }
.position-slot .role-avatar { width: 70px; height: 70px; }

/* 战斗区 */
.battle-field { display: flex; justify-content: space-between; align-items: flex-start; gap: 30px; margin-bottom: 25px; }
.player-side { flex: 1; text-align: center; }
.player-side h3 { color: #2c3e50; margin-bottom: 20px; font-size: 1.4rem; }
.role-cards { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; }
.battle-role-card { width: 150px; background: white; border: 3px solid #e0e0e0; border-radius: 15px; padding: 12px; text-align: center; transition: all 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.05); position: relative; }
.battle-role-card:hover:not(.dead):not(.disabled) { transform: scale(1.05); box-shadow: 0 6px 15px rgba(0,0,0,0.1); }
.battle-role-card.selected { border-color: #f39c12; box-shadow: 0 0 15px rgba(243, 156, 18, 0.6); }
.battle-role-card.targetable { border-color: #e74c3c; box-shadow: 0 0 15px rgba(231, 76, 60, 0.6); animation: pulse 1s infinite; }
.battle-role-card.dead { filter: grayscale(100%); opacity: 0.6; cursor: not-allowed; }
.position-tag { position: absolute; top: 5px; left: 5px; background: #3498db; color: white; padding: 3px 8px; border-radius: 8px; font-size: 0.9rem; }
.buff-list { display: flex; flex-wrap: wrap; justify-content: center; gap: 4px; margin-top: 8px; }
.buff-tag { font-size: 0.8rem; padding: 3px 6px; border-radius: 6px; font-weight: bold; }
.buff-tag.buff { background: #dff0d8; color: #3c763d; }
.buff-tag.debuff { background: #f2dede; color: #a94442; }
.skill-area { flex: 1.2; display: flex; flex-direction: column; align-items: center; gap: 20px; }
.current-tip { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 12px 25px; border-radius: 10px; font-weight: bold; font-size: 1.1rem; box-shadow: 0 4px 10px rgba(102, 126, 234, 0.4); }
.tip { color: #e74c3c; font-weight: bold; font-size: 1.1rem; }
.skill-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; width: 100%; }
.skill-card { background: white; border: 2px solid #e0e0e0; border-radius: 12px; padding: 15px; cursor: pointer; transition: all 0.3s; box-shadow: 0 3px 8px rgba(0,0,0,0.05); }
.skill-card:hover:not(.disabled) { border-color: #667eea; background: #f3e5f5; transform: translateY(-3px); box-shadow: 0 5px 12px rgba(102, 126, 234, 0.2); }
.skill-card.disabled { cursor: not-allowed; opacity: 0.6; }
.skill-name { font-weight: bold; color: #2c3e50; font-size: 1.1rem; margin-bottom: 5px; }
.skill-desc { color: #666; font-size: 0.9rem; margin-bottom: 8px; }
.skill-cooldown { color: #e74c3c; font-size: 0.9rem; font-weight: bold; }
.skill-ultimate { border-left: 4px solid #f39c12; }

/* 弹窗 */
.modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 1000; }
.modal-content { background: white; padding: 40px; border-radius: 20px; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.3); max-width: 500px; }
.modal-content h2 { border: none; padding: 0; font-size: 2.2rem; color: #2c3e50; margin-bottom: 15px; }
.modal-content p { color: #666; font-size: 1.1rem; margin-bottom: 30px; }

@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
  </style>
</head>
<body>
  <div class="container">
    <h1>⚔️ 同步回合制策略对抗游戏</h1>
    <div id="stage-tip" class="stage-tip">请玩家1选择参战角色</div>
    <div id="round-counter" class="round-counter" style="display: none;">第 1 / 20 回合</div>

    <!-- 选角区 -->
    <div id="role-select-section" class="section">
      <h2>可选角色（22名）</h2>
      <div style="text-align: center; margin-bottom: 20px;">
        <button id="switch-select-player" class="btn btn-small" style="display: inline-block; margin: 0 10px;">当前配置：玩家1</button>
        <span style="color: #666; font-size: 1rem;">👉 点击切换要配置的玩家，双方各选3名</span>
      </div>
      <div id="role-list" class="role-grid"></div>
      <div class="selected-roles">
        <div style="color: #e74c3c; font-weight: bold; font-size: 1.2rem;">玩家1已选：<span id="player1-selected">0/3</span></div>
        <div style="color: #3498db; font-weight: bold; font-size: 1.2rem;">玩家2已选：<span id="player2-selected">0/3</span></div>
      </div>
      <button id="confirm-roles" class="btn" disabled>确认选角</button>
    </div>

    <!-- 站位区 -->
    <div id="position-select-section" class="section" style="display: none;">
      <h2>安排站位（左/中/右不影响规则，可自由安排）</h2>
      <div class="position-area">
        <div class="player-position" id="player1-position">
          <h3 style="color: #e74c3c;">玩家1 站位</h3>
          <div class="position-slots">
            <div class="position-slot" data-position="left">左侧</div>
            <div class="position-slot" data-position="center">中路</div>
            <div class="position-slot" data-position="right">右侧</div>
          </div>
        </div>
        <div class="player-position" id="player2-position">
          <h3 style="color: #3498db;">玩家2 站位</h3>
          <div class="position-slots">
            <div class="position-slot" data-position="left">左侧</div>
            <div class="position-slot" data-position="center">中路</div>
            <div class="position-slot" data-position="right">右侧</div>
          </div>
        </div>
      </div>
      <button id="confirm-positions" class="btn" disabled>确认站位，开始战斗！</button>
    </div>

    <!-- 战斗区 -->
    <div id="battle-section" class="section" style="display: none;">
      <div class="battle-field">
        <div class="player-side" id="player2-side">
          <h3 style="color: #3498db;">玩家2 阵容</h3>
          <div class="role-cards"></div>
        </div>
        <div class="skill-area">
          <div id="current-player-tip" class="current-tip">当前回合：等待玩家1操作</div>
          <div id="skill-list" class="skill-grid"></div>
          <div id="target-select-tip" class="tip" style="display: none;">请选择技能目标</div>
        </div>
        <div class="player-side" id="player1-side">
          <h3 style="color: #e74c3c;">玩家1 阵容</h3>
          <div class="role-cards"></div>
        </div>
      </div>
    </div>

    <!-- 胜负弹窗 -->
    <div id="result-modal" class="modal" style="display: none;">
      <div class="modal-content">
        <h2 id="result-text">游戏结束</h2>
        <p id="result-desc"></p>
        <button id="restart-btn" class="btn">再来一局</button>
      </div>
    </div>
  </div>

  <script>
// ==============================
// 🔧 Buff编辑区 - 可自由添加/修改Buff效果
// ==============================
const BUFF_LIST = {
  attackUp: { 
    id: 'attackUp', name: '攻击强化', type: 'buff', 
    description: '造成的伤害提升50%', duration: 2,
    effect: (t) => { t.damageDealtMultiplier *= 1.5; } 
  },
  attackDown: { 
    id: 'attackDown', name: '攻击弱化', type: 'debuff', 
    description: '造成的伤害降低50%', duration: 2,
    effect: (t) => { t.damageDealtMultiplier *= 0.5; } 
  },
  shieldUp: { 
    id: 'shieldUp', name: '护盾', type: 'buff', 
    description: '吸收伤害', duration: 0 // 一次性
  },
  silence: { 
    id: 'silence', name: '沉默', type: 'debuff', 
    description: '无法使用二技能和大招', duration: 2 
  },
  dodge: { 
    id: 'dodge', name: '闪避', type: 'buff', 
    description: '闪避下一次单体技能', duration: 1 
  },
  reflect: { 
    id: 'reflect', name: '反伤', type: 'buff', 
    description: '受到伤害时反弹50%', duration: 2,
    onHit: (t, dmg) => { return { damage: dmg * 0.5, targetType: 'lastAttacker' }; } 
  },
  mark: { 
    id: 'mark', name: '致命标记', type: 'debuff', 
    description: '受到的下一次伤害翻倍', duration: 3 
  },
  invisibility: { 
    id: 'invisibility', name: '隐身', type: 'buff', 
    description: '无法被选为单体技能目标，群体技能正常命中', duration: 2 
  },
  taunt: { 
    id: 'taunt', name: '嘲讽', type: 'buff', 
    description: '强制敌人优先攻击自己', duration: 2 
  },
  bleed: { 
    id: 'bleed', name: '流血', type: 'debuff', 
    description: '每回合结束时受到0.5点真实伤害', duration: 3,
    onTurnEnd: (t) => { t.currentHp = Math.max(0, t.currentHp - 0.5); } 
  },
  poison: { 
    id: 'poison', name: '剧毒', type: 'debuff', 
    description: '每回合结束时受到1点真实伤害，治疗效果减半', duration: 3,
    onTurnEnd: (t) => { t.currentHp = Math.max(0, t.currentHp - 1); },
    effect: (t) => { t.healTakenMultiplier *= 0.5; } 
  },
  burn: { 
    id: 'burn', name: '灼烧', type: 'debuff', 
    description: '每回合结束时受到0.5点真实伤害，攻击时额外造成0.3点伤害', duration: 3,
    onTurnEnd: (t) => { t.currentHp = Math.max(0, t.currentHp - 0.5); },
    effect: (t) => { t.extraBurnDamage = 0.3; } 
  },
  lastStand: { 
    id: 'lastStand', name: '回光返照', type: 'buff', 
    description: '首次死亡时复活，恢复2点血量，清除所有Buff/Debuff', duration: 0,
    onDeath: (t) => { 
      if (!t.hasRevived) {
        t.hasRevived = true;
        t.currentHp = 2;
        t.buffs = [];
        t.debuffs = [];
        return true; // 表示成功复活
      }
      return false;
    } 
  },
  critBoost: { 
    id: 'critBoost', name: '暴击增幅', type: 'buff', 
    description: '下一次单体技能伤害翻倍（不含额外伤害）', duration: 1 
  },
  cleanse: { 
    id: 'cleanse', name: '净化', type: 'buff', 
    description: '清除所有Debuff', duration: 0 // 一次性
  },
  damageReduction: { 
    id: 'damageReduction', name: '伤害减免', type: 'buff', 
    description: '受到的伤害降低50%', duration: 2,
    effect: (t) => { t.damageTakenMultiplier *= 0.5; } 
  },
  lifestealBoost: { 
    id: 'lifestealBoost', name: '吸血增强', type: 'buff', 
    description: '吸血效果翻倍', duration: 2,
    effect: (t) => { t.lifestealMultiplier *= 2; } 
  },
  confusion: { 
    id: 'confusion', name: '混乱', type: 'debuff', 
    description: '选择目标时会随机选择（包括友方）', duration: 2 
  }
};

// ==============================
// 角色配置
// ==============================
const ROLE_LIST = [
  { 
    id: 'warrior', name: '狂战士', 
    avatar: 'https://api.dicebear.com/7.x/adventurer/svg?seed=warrior', 
    maxHp: 8, maxEnergy: 3,
    skills: [
      { name: '猛击', description: '造成1.5点伤害，回1点充能', cooldown: 0, energyGain: 1, targetType: 'enemy',
        effect: (t, c) => { return { damage: 1.5 }; } },
      { name: '旋风斩', description: '对所有敌人造成1点伤害，回2点充能', cooldown: 2, energyGain: 2, targetType: 'allEnemy',
        effect: (t, c) => { return { damage: 1 }; } },
      { name: '狂暴', description: '造成3点伤害，获得「攻击强化」持续2回合', cooldown: 0, energyCost: 3, targetType: 'enemy', isUltimate: true,
        effect: (t, c) => { return { damage: 3, buff: BUFF_LIST.attackUp }; } }
    ] 
  },
  { 
    id: 'mage', name: '大法师', 
    avatar: 'https://api.dicebear.com/7.x/adventurer/svg?seed=mage', 
    maxHp: 5, maxEnergy: 4,
    skills: [
      { name: '火球术', description: '造成2点伤害，回1点充能', cooldown: 0, energyGain: 1, targetType: 'enemy',
        effect: (t, c) => { return { damage: 2 }; } },
      { name: '冰霜新星', description: '对所有敌人造成1点伤害，附加「眩晕」（闪避一次）', cooldown: 3, energyGain: 2, targetType: 'allEnemy',
        effect: (t, c) => { return { damage: 1, buff: BUFF_LIST.dodge }; } },
      { name: '末日审判', description: '对所有敌人造成4点伤害', cooldown: 0, energyCost: 4, targetType: 'allEnemy', isUltimate: true,
        effect: (t, c) => { return { damage: 4 }; } }
    ] 
  },
  { 
    id: 'healer', name: '神圣牧师', 
    avatar: 'https://api.dicebear.com/7.x/adventurer/svg?seed=healer', 
    maxHp: 6, maxEnergy: 3,
    skills: [
      { name: '圣光术', description: '为友方恢复1.5点血量，回1点充能', cooldown: 0, energyGain: 1, targetType: 'ally',
        effect: (t, c) => { return { damage: -1.5 }; } },
      { name: '群体治疗', description: '为所有友方恢复1点血量，回2点充能', cooldown: 3, energyGain: 2, targetType: 'allAlly',
        effect: (t, c) => { return { damage: -1 }; } },
      { name: '神圣庇护', description: '为所有友方附加「伤害减免」持续2回合', cooldown: 0, energyCost: 3, targetType: 'allAlly', isUltimate: true,
        effect: (t, c) => { return { buff: BUFF_LIST.damageReduction }; } }
    ] 
  },
  { 
    id: 'tank', name: '钢铁守卫', 
    avatar: 'https://api.dicebear.com/7.x/adventurer/svg?seed=tank', 
    maxHp: 12, maxEnergy: 4,
    skills: [
      { name: '盾击', description: '造成1点伤害，获得1点护盾，回1点充能', cooldown: 0, energyGain: 1, targetType: 'enemy',
        effect: (t, c) => { c.shield += 1; return { damage: 1 }; } },
      { name: '坚守阵地', description: '获得3点护盾，附加「嘲讽」持续2回合', cooldown: 2, energyGain: 2, targetType: 'self',
        effect: (t, c) => { c.shield += 3; return { buff: BUFF_LIST.taunt }; } },
      { name: '不灭之躯', description: '为自己附加「回光返照」', cooldown: 0, energyCost: 4, targetType: 'self', isUltimate: true,
        effect: (t, c) => { return { buff: BUFF_LIST.lastStand }; } }
    ] 
  },
  { 
    id: 'archer', name: '精灵射手', 
    avatar: 'https://api.dicebear.com/7.x/adventurer/svg?seed=archer', 
    maxHp: 6, maxEnergy: 2,
    skills: [
      { name: '精准射击', description: '造成2点伤害，回1点充能', cooldown: 0, energyGain: 1, targetType: 'enemy',
        effect: (t, c) => { return { damage: 2 }; } },
      { name: '多重射击', description: '对随机2名敌人造成1.5点伤害', cooldown: 2, energyGain: 2, targetType: 'allEnemy',
        effect: (t, c) => { return { damage: 1.5 }; } },
      { name: '致命一击', description: '造成5点伤害，附加「致命标记」', cooldown: 0, energyCost: 2, targetType: 'enemy', isUltimate: true,
        effect: (t, c) => { return { damage: 5, buff: BUFF_LIST.mark }; } }
    ] 
  },
  { 
    id: 'assassin', name: '暗影刺客', 
    avatar: 'https://api.dicebear.com/7.x/adventurer/svg?seed=assassin',

// ==============================
// 游戏全局状态
// ==============================
let gameState = {
  stage: 'roleSelect', // 整体游戏阶段：roleSelect/positionSelect/battle
  currentOperatePlayer: 1, // 当前正在操作的玩家
  round: 1,
  players: {
    1: { selectedRoles: [], positions: {}, battleRoles: [] },
    2: { selectedRoles: [], positions: {}, battleRoles: [] }
  },
  firstPlayer: null, // 先后手，结算时先手先执行技能
  // 战斗内状态
  battleStage: 'waitingAction',
  pendingActions: { // 存储双方待结算的操作
    1: null,
    2: null
  },
  selectedRole: null, // 当前操作选中的角色
  selectedSkill: null, // 当前选中的技能
  selectedSkillIndex: null,
  selectingTarget: false, // 是否正在选目标
  lastAttacker: null // 用于反伤记录
};

// ==============================
// 工具函数
// ==============================
function renderHp(hp, maxHp) {
  let html = '';
  const full = Math.floor(hp);
  const half = hp % 1 >= 0.5;
  const empty = Math.floor(maxHp) - full - (half ? 1 : 0);
  html += '<div class="heart"></div>'.repeat(full);
  if (half) html += '<div class="heart half"></div>';
  html += '<div class="heart empty"></div>'.repeat(empty);
  return html;
}
function renderEnergy(energy, maxEnergy) {
  let html = '';
  for (let i = 0; i < maxEnergy; i++) {
    html += `<div class="energy ${i < energy ? 'filled' : ''}"></div>`;
  }
  return html;
}
function renderBuffs(buffs) {
  if (!buffs.length) return '';
  return buffs.map(b => `
    <div class="buff-tag ${b.type}" title="${b.description} (剩余${b.duration}回合)">
      ${b.name}${b.duration>0?`(${b.duration})`:''}
    </div>
  `).join('');
}
function isPlayerAllDead(playerId) {
  return gameState.players[playerId].battleRoles.every(r => r.currentHp <= 0);
}
function getPlayerTotalHp(playerId) {
  return gameState.players[playerId].battleRoles.reduce((sum, r) => sum + r.currentHp, 0);
}

// ==============================
// 选角阶段逻辑
// ==============================
function initRoleSelect() {
  $roleList.innerHTML = '';
  ROLE_LIST.forEach(role => {
    const card = document.createElement('div');
    card.className = 'role-card';
    card.dataset.roleId = role.id;
    card.innerHTML = `
      <img src="${role.avatar}" alt="${role.name}" class="role-avatar">
      <div class="role-name">${role.name}</div>
      <div class="hp-display">${renderHp(role.maxHp, role.maxHp)}</div>
      <div class="energy-display">${renderEnergy(0, role.maxEnergy)}</div>
      <div style="font-size:11px; color:#666; margin-top:5px; line-height:1.3;">
        ${role.skills.map((s,i) => `${i+1}.${s.name}${s.isUltimate?'⚡':''}`).join(' | ')}
      </div>
    `;
    card.addEventListener('click', () => handleRoleSelect(role.id));
    $roleList.appendChild(card);
  });
  $switchSelectPlayer.textContent = `当前配置：玩家${gameState.currentOperatePlayer}`;
  updateSelectedRolesTip();
  updateRoleCardStatus();
}
$switchSelectPlayer.addEventListener('click', () => {
  gameState.currentOperatePlayer = gameState.currentOperatePlayer === 1 ? 2 : 1;
  $switchSelectPlayer.textContent = `当前配置：玩家${gameState.currentOperatePlayer}`;
  updateRoleCardStatus();
  $stageTip.textContent = `请玩家${gameState.currentOperatePlayer}选择参战角色`;
});
function handleRoleSelect(roleId) {
  const curPlayer = gameState.currentOperatePlayer;
  const selected = gameState.players[curPlayer].selectedRoles;
  const otherPlayer = curPlayer === 1 ? 2 : 1;
  if (selected.includes(roleId)) {
    selected.splice(selected.indexOf(roleId), 1);
  } else {
    if (gameState.players[otherPlayer].selectedRoles.includes(roleId)) {
      alert('该角色已被对方选择，请选其他角色');
      return;
    }
    if (selected.length >= GAME_CONFIG.ROLES_PER_PLAYER) {
      alert(`玩家${curPlayer}已选满${GAME_CONFIG.ROLES_PER_PLAYER}个角色`);
      return;
    }
    selected.push(roleId);
  }
  updateSelectedRolesTip();
  updateRoleCardStatus();
  const p1Done = gameState.players[1].selectedRoles.length === GAME_CONFIG.ROLES_PER_PLAYER;
  const p2Done = gameState.players[2].selectedRoles.length === GAME_CONFIG.ROLES_PER_PLAYER;
  $confirmRolesBtn.disabled = !(p1Done && p2Done);
}
function updateSelectedRolesTip() {
  $player1Selected.textContent = `${gameState.players[1].selectedRoles.length}/${GAME_CONFIG.ROLES_PER_PLAYER}`;
  $player2Selected.textContent = `${gameState.players[2].selectedRoles.length}/${GAME_CONFIG.ROLES_PER_PLAYER}`;
}
function updateRoleCardStatus() {
  document.querySelectorAll('.role-card').forEach(card => {
    const roleId = card.dataset.roleId;
    const p1Sel = gameState.players[1].selectedRoles.includes(roleId);
    const p2Sel = gameState.players[2].selectedRoles.includes(roleId);
    const isSelectedByCurPlayer = gameState.currentOperatePlayer === 1 ? p1Sel : p2Sel;
    const isSelectedByOther = gameState.currentOperatePlayer === 1 ? p2Sel : p1Sel;
    card.classList.toggle('selected', isSelectedByCurPlayer);
    if (isSelectedByOther) {
      card.style.borderColor = '#3498db';
      card.style.background = '#e3f2fd';
      card.classList.add('disabled');
    } else if (isSelectedByCurPlayer) {
      card.style.borderColor = '#e74c3c';
      card.style.background = '#ffebee';
      card.classList.remove('disabled');
    } else {
      card.style.borderColor = '#e0e0e0';
      card.style.background = 'white';
      card.classList.remove('disabled');
    }
  });
}
$confirmRolesBtn.addEventListener('click', () => {
  gameState.stage = 'positionSelect';
  $roleSelectSection.style.display = 'none';
  $positionSelectSection.style.display = 'block';
  gameState.currentOperatePlayer = 1;
  $stageTip.textContent = '请玩家1安排角色站位';
  initPositionSelect();
});

// ==============================
// 站位选择阶段
// ==============================
function initPositionSelect() {
  renderPositionSlots(1);
  renderPositionSlots(2);
}
function renderPositionSlots(playerId) {
  const container = playerId === 1 ? $player1Position : $player2Position;
  const slots = container.querySelectorAll('.position-slot');
  const selectedRoles = gameState.players[playerId].selectedRoles;
  slots.forEach(slot => {
    const pos = slot.dataset.position;
    const filledRoleId = gameState.players[playerId].positions[pos];
    if (filledRoleId) {
      const role = ROLE_LIST.find(r => r.id === filledRoleId);
      slot.innerHTML = `<img src="${role.avatar}" class="role-avatar"><div style="font-weight:bold;">${role.name}</div>`;
      slot.classList.add('filled');
    } else {
      slot.textContent = pos === 'left' ? '左侧' : pos === 'center' ? '中路' : '右侧';
      slot.classList.remove('filled');
    }
    slot.onclick = playerId === gameState.currentOperatePlayer ? () => handlePositionSelect(playerId, pos) : null;
  });
  const p1Done = Object.keys(gameState.players[1].positions).length === GAME_CONFIG.ROLES_PER_PLAYER;
  const p2Done = Object.keys(gameState.players[2].positions).length === GAME_CONFIG.ROLES_PER_PLAYER;
  $confirmPositionsBtn.disabled = !(p1Done && p2Done);
  if (p1Done && gameState.currentOperatePlayer === 1) {
    gameState.currentOperatePlayer = 2;
    $stageTip.textContent = '请玩家2安排角色站位';
    renderPositionSlots(2);
  }
}
function handlePositionSelect(playerId, pos) {
  const positions = gameState.players[playerId].positions;
  if (positions[pos]) {
    delete positions[pos];
  } else {
    const unassigned = gameState.players[playerId].selectedRoles.filter(id => !Object.values(positions).includes(id));
    if (unassigned.length) positions[pos] = unassigned[0];
  }
  renderPositionSlots(playerId);
}
$confirmPositionsBtn.addEventListener('click', () => {
  initBattleRoles();
  rollInitiative();
  gameState.stage = 'battle';
  gameState.battleStage = 'waitingP1Action';
  gameState.currentOperatePlayer = 1;
  $positionSelectSection.style.display = 'none';
  $battleSection.style.display = 'block';
  $roundCounter.style.display = 'block';
  $roundCounter.textContent = `第 ${gameState.round} / ${GAME_CONFIG.MAX_ROUND} 回合`;
  $stageTip.textContent = `战斗开始！先手为玩家${gameState.firstPlayer}，第1回合，请玩家1选择要操作的角色`;
  renderBattleField();
  renderSkillList();
});

// ==============================
// 战斗初始化
// ==============================
function initBattleRoles() {
  [1,2].forEach(playerId => {
    const positions = gameState.players[playerId].positions;
    gameState.players[playerId].battleRoles = Object.entries(positions).map(([pos, roleId]) => {
      const template = ROLE_LIST.find(r => r.id === roleId);
      return {
        ...template,
        currentHp: template.maxHp,
        currentEnergy: 0,
        position: pos,
        buffs: [],
        skillCooldowns: [0,0,0],
        damageTakenMultiplier: 1,
        damageDealtMultiplier: 1,
        healTakenMultiplier: 1,
        lifestealMultiplier: 1,
        extraBurnDamage: 0,
        shield: 0,
        hasRevived: false
      };
    });
  });
}
function rollInitiative() {
  const p1Roll = Math.floor(Math.random()*100) + 1;
  const p2Roll = Math.floor(Math.random()*100) + 1;
  gameState.firstPlayer = p1Roll >= p2Roll ? 1 : 2;
  alert(`先后手判定：玩家1 ${p1Roll} vs 玩家2 ${p2Roll}，玩家${gameState.firstPlayer}先手！`);
}

// ==============================
// 战斗渲染逻辑
// ==============================
function renderBattleField() {
  renderPlayerBattleRoles(1, $player1Side.querySelector('.role-cards'));
  renderPlayerBattleRoles(2, $player2Side.querySelector('.role-cards'));
  $currentPlayerTip.textContent = `当前回合：等待玩家${gameState.currentOperatePlayer}操作`;
}
function renderPlayerBattleRoles(playerId, container) {
  const roles = gameState.players[playerId].battleRoles;
  container.innerHTML = '';
  roles.forEach(role => {
    const card = document.createElement('div');
    card.className = `battle-role-card ${role.currentHp <=0 ? 'dead' : ''}`;
    card.dataset.roleId = role.id;
    card.dataset.playerId = playerId;
    card.innerHTML = `
      <div class="position-tag">${role.position === 'left' ? '左' : role.position === 'center' ? '中' : '右'}</div>
      <img src="${role.avatar}" class="role-avatar">
      <div class="role-name">${role.name}</div>
      <div class="hp-display">${renderHp(role.currentHp, role.maxHp)}</div>
      <div class="energy-display">${renderEnergy(role.currentEnergy || 0, role.maxEnergy)}</div>
      ${role.shield > 0 ? `<div style="font-size:12px; color:#3498db; margin-top:3px;">🛡️ ${role.shield.toFixed(1)}心</div>` : ''}
      <div class="buff-list">${renderBuffs(role.buffs)}</div>
      ${role.skillCooldowns.some(cd=>cd>0) ? `<div style="font-size:10px; color:#666; margin-top:5px;">冷却：${role.skillCooldowns.map((cd,idx)=>cd>0?`技能${idx+1}:${cd}`:'').filter(Boolean).join(' ')}</div>` : ''}
    `;
    if (gameState.selectingTarget) {
      const targetable = checkTargetable(gameState.selectedSkill.targetType, playerId, role);
      if (targetable) {
        card.classList.add('targetable');
        card.addEventListener('click', () => handleTargetSelect(role, playerId));
      }
    }
    if (!gameState.selectingTarget && playerId === gameState.currentOperatePlayer && role.currentHp>0) {
      card.addEventListener('click', () => handleOperateRoleSelect(role));
    }
    container.appendChild(card);
  });
}
function handleOperateRoleSelect(role) {
  gameState.selectedRole = role;
  document.querySelectorAll('.battle-role-card').forEach(c => c.classList.remove('selected'));
  event.currentTarget.classList.add('selected');
  renderSkillList();
}
function renderSkillList() {
  $skillList.innerHTML = '';
  if (!gameState.selectedRole) {
    $skillList.innerHTML = '<div style="grid-column:1/-1; color:#999; text-align:center; padding:20px;">请先选择你要操作的角色</div>';
    return;
  }
  gameState.selectedRole.skills.forEach((skill, idx) => {
    const cd = gameState.selectedRole.skillCooldowns[idx];
    const isSilenced = gameState.selectedRole.buffs.some(b => b.id === 'silence');
    const canUseUltimate = skill.isUltimate ? (gameState.selectedRole.currentEnergy || 0) >= skill.energyCost : true;
    const disabled = cd > 0 || (isSilenced && idx > 0) || (skill.isUltimate && !canUseUltimate);
    const card = document.createElement('div');
    card.className = `skill-card ${disabled ? 'disabled' : ''} ${skill.isUltimate ? 'skill-ultimate' : ''}`;
    card.innerHTML = `
      <div class="skill-name">${skill.name}${skill.isUltimate?` (${skill.energyCost}⚡)`:''}</div>
      <div class="skill-desc">${skill.description}</div>
      ${cd>0 ? `<div class="skill-cooldown">冷却中：${cd}回合</div>` : ''}
      ${skill.isUltimate && !canUseUltimate && cd===0 ? `<div class="skill-cooldown">充能不足</div>` : ''}
      ${isSilenced && idx>0 && cd===0 ? `<div class="skill-cooldown">已沉默</div>` : ''}
    `;
    if (!disabled) card.addEventListener('click', () => handleSkillSelect(skill, idx));
    $skillList.appendChild(card);
  });
}
function handleSkillSelect(skill, idx) {
  gameState.selectedSkill = skill;
  gameState.selectedSkillIndex = idx;
  gameState.selectingTarget = true;
  $targetSelectTip.style.display = 'block';
  $targetSelectTip.textContent = `请选择技能「${skill.name}」的目标`;
  renderBattleField();
}
function checkTargetable(targetType, targetPlayerId, role) {
  const curPlayer = gameState.currentOperatePlayer;
  const enemyHasTaunt = gameState.players[curPlayer === 1 ? 2 : 1].battleRoles.some(r => r.currentHp>0 && r.buffs.some(b => b.id === 'taunt'));
  if (enemyHasTaunt && targetType === 'enemy' && !role.buffs.some(b => b.id === 'taunt')) {
    return false;
  }
  if (role.buffs.some(b => b.id === 'invisibility') && (targetType === 'enemy' || targetType === 'ally') && targetType !== 'allEnemy' && targetType !== 'allAlly') {
    return false;
  }
  switch(targetType) {
    case 'enemy': return targetPlayerId !== curPlayer && role.currentHp>0;
    case 'ally': return targetPlayerId === curPlayer && role.currentHp>0;
    case 'self': return targetPlayerId === curPlayer && role.id === gameState.selectedRole.id;
    case 'allEnemy': return targetPlayerId !== curPlayer && role.currentHp>0;
    case 'allAlly': return targetPlayerId === curPlayer && role.currentHp>0;
    default: return false;
  }
}

// ==============================
// 核心：操作处理与结算
// ==============================
function handleTargetSelect(target, targetPlayerId) {
  const skill = gameState.selectedSkill;
  const caster = gameState.selectedRole;
  let targets = [];

  // 整理目标列表（和原逻辑一致，处理群体/混乱）
  if (skill.targetType === 'allEnemy') {
    targets = gameState.players[targetPlayerId === 1 ? 2 : 1].battleRoles.filter(r => r.currentHp>0);
  } else if (skill.targetType === 'allAlly') {
    targets = gameState.players[gameState.currentOperatePlayer].battleRoles.filter(r => r.currentHp>0);
  } else {
    if (caster.buffs.some(b => b.id === 'confusion')) {
      const allAlive = [
        ...gameState.players[1].battleRoles.filter(r => r.currentHp>0),
        ...gameState.players[2].battleRoles.filter(r => r.currentHp>0)
      ];
      targets = [allAlive[Math.floor(Math.random() * allAlive.length)]];
    } else {
      targets = [target];
    }
  }

  // 存储当前玩家的操作
  gameState.pendingActions[gameState.currentOperatePlayer] = {
    caster: caster,
    skill: skill,
    skillIndex: gameState.selectedSkillIndex,
    targets: targets
  };

  // 重置选择状态
  gameState.selectingTarget = false;
  gameState.selectedRole = null;
  gameState.selectedSkill = null;
  gameState.selectedSkillIndex = null;
  $targetSelectTip.style.display = 'none';

  // 判断是否双方都操作完成
  if (gameState.currentOperatePlayer === 1) {
    // 切到玩家2操作
    gameState.currentOperatePlayer = 2;
    $stageTip.textContent = `第${gameState.round}回合，请玩家2选择要操作的角色`;
    renderBattleField();
    renderSkillList();
  } else {
    // 双方都操作完成，进入结算
    settleRound();
  }
}

// 执行单个操作的技能效果
function executeAction(action) {
  const { caster, skill, skillIndex, targets } = action;
  gameState.lastAttacker = caster;

  targets.forEach(t => {
    // 闪避处理
    if (t.buffs.some(b => b.id === 'dodge') && skill.targetType !== 'allEnemy' && skill.targetType !== 'allAlly') {
      alert(`${t.name} 闪避了${caster.name}的技能！`);
      t.buffs = t.buffs.filter(b => b.id !== 'dodge');
      return;
    }

    const effect = skill.effect(t, caster);
    let damage = effect.damage;

    // 伤害计算
    if (damage > 0) {
      damage *= caster.damageDealtMultiplier;
      // 暴击增幅处理
      if (caster.buffs.some(b => b.id === 'critBoost')) {
        damage *= 2;
        caster.buffs = caster.buffs.filter(b => b.id !== 'critBoost');
      }
      // 致命标记处理
      if (t.buffs.some(b => b.id === 'mark')) {
        damage *= 2;
        t.buffs = t.buffs.filter(b => b.id !== 'mark');
      }
      // 灼烧额外伤害
      damage += (caster.extraBurnDamage || 0);
      // 护盾吸收
      if (t.shield > 0) {
        const absorb = Math.min(t.shield, damage);
        t.shield -= absorb;
        damage -= absorb;
      }
      // 伤害减免
      damage *= t.damageTakenMultiplier;
      // 反伤处理
      const reflectBuff = t.buffs.find(b => b.id === 'reflect');
      if (reflectBuff && reflectBuff.onHit) {
        const reflectResult = reflectBuff.onHit(t, damage);
        if (reflectResult && reflectResult.targetType === 'lastAttacker' && gameState.lastAttacker) {
          gameState.lastAttacker.currentHp = Math.max(0, gameState.lastAttacker.currentHp - reflectResult.damage);
          alert(`${gameState.lastAttacker.name} 受到了 ${reflectResult.damage.toFixed(1)} 点反伤！`);
        }
      }
      // 最终扣血
      t.currentHp = Math.max(0, t.currentHp - damage);
      if (damage > 0) {
        alert(`${caster.name}对${t.name}造成${damage.toFixed(1)}点伤害！`);
      }
    } else if (damage < 0) {
      // 治疗计算
      let heal = -damage;
      heal *= t.healTakenMultiplier;
      t.currentHp = Math.min(t.maxHp, t.currentHp + heal);
      alert(`${caster.name}为${t.name}恢复${heal.toFixed(1)}点血量！`);
    }

    // 添加Buff处理
    if (effect.buff) {
      const buffs = Array.isArray(effect.buff) ? effect.buff : [effect.buff];
      buffs.forEach(buffTemp => {
        if (!buffTemp) return;
        const buff = {...buffTemp};
        if (buff.effect) buff.effect(t);
        if (buff.onDeath) {
          t.buffs.push(buff);
          alert(`${caster.name}给${t.name}附加「${buff.name}」！`);
        } else if (buff.duration > 0) {
          const existing = t.buffs.find(b => b.id === buff.id);
          existing ? existing.duration = buff.duration : t.buffs.push(buff);
          alert(`${caster.name}给${t.name}附加「${buff.name}」，持续${buff.duration}回合！`);
        } else if (buff.id === 'cleanse') {
          t.buffs = t.buffs.filter(b => b.type === 'buff');
          alert(`${caster.name}为${t.name}清除了所有Debuff！`);
        }
      });
    }
  });

  // 能量和冷却处理
  if (!skill.isUltimate && skill.energyGain) {
    caster.currentEnergy = Math.min(caster.maxEnergy, (caster.currentEnergy || 0) + skill.energyGain);
  }
  if (skill.isUltimate && skill.energyCost) {
    caster.currentEnergy = (caster.currentEnergy || 0) - skill.energyCost;
  }
  caster.skillCooldowns[skillIndex] = skill.cooldown;
}

// 回合结算
function settleRound() {
  // 按先手顺序结算技能
  const actionOrder = gameState.firstPlayer === 1 ? [1, 2] : [2, 1];
  actionOrder.forEach(playerId => {
    const action = gameState.pendingActions[playerId];
    if (action) executeAction(action);
  });

  // 处理回合结束：Buff递减、冷却递减
  processRoundEnd();

  // 检查游戏结束
  if (checkGameEnd()) return;

  // 超过最大回合限制
  if (gameState.round > GAME_CONFIG.MAX_ROUND) {
    handleRoundLimitEnd();
    return;
  }

  // 进入下一个回合
  gameState.round++;
  $roundCounter.textContent = `第 ${gameState.round} / ${GAME_CONFIG.MAX_ROUND} 回合`;
  gameState.pendingActions = {1: null, 2: null};
  gameState.currentOperatePlayer = 1;
  $stageTip.textContent = `第${gameState.round}回合，请玩家1选择要操作的角色`;
  renderBattleField();
  renderSkillList();
}

// 处理回合结束的Buff和冷却
function processRoundEnd() {
  [1, 2].forEach(playerId => {
    gameState.players[playerId].battleRoles.forEach(role => {
      // 先触发所有Buff的回合结束效果
      role.buffs.forEach(buff => {
        if (buff.onTurnEnd) buff.onTurnEnd(role);
      });
      // 减少持续时间，移除过期Buff
      role.buffs.forEach(buff => buff.duration--);
      role.buffs = role.buffs.filter(buff => buff.duration > 0);
      // 重置每回合属性乘数
      role.damageTakenMultiplier = 1;
      role.damageDealtMultiplier = 1;
      role.healTakenMultiplier = 1;
      role.lifestealMultiplier = 1;
      role.extraBurnDamage = 0;
      // 冷却减少1
      role.skillCooldowns = role.skillCooldowns.map(cd => Math.max(0, cd - 1));
      // 重新应用当前Buff的效果
      role.buffs.forEach(buff => {
        if (buff.effect) buff.effect(role);
      });
    });
  });
}

// ==============================
// 胜负判定
// ==============================
function checkGameEnd() {
  // 处理复活
  [1,2].forEach(playerId => {
    gameState.players[playerId].battleRoles.forEach(role => {
      if (role.currentHp <= 0) {
        const lastStand = role.buffs.find(b => b.id === 'lastStand');
        if (lastStand && lastStand.onDeath) {
          const revived = lastStand.onDeath(role);
          if (revived) {
            alert(`${role.name} 触发了「回光返照」复活了！`);
            // 复活后重新应用Buff效果
            role.buffs.forEach(buff => {
              if (buff.effect) buff.effect(role);
            });
          }
        }
      }
    });
  });

  const p1Dead = isPlayerAllDead(1);
  const p2Dead = isPlayerAllDead(2);
  if (p1Dead && p2Dead) {
    showResult('平局！', '双方角色全部阵亡');
    return true;
  } else if (p1Dead) {
    showResult('玩家2获胜！', '玩家1所有角色被击败');
    return true;
  } else if (p2Dead) {
    showResult('玩家1获胜！', '玩家2所有角色被击败');
    return true;
  }
  return false;
}

function handleRoundLimitEnd() {
  const p1Hp = getPlayerTotalHp(1);
  const p2Hp = getPlayerTotalHp(2);
  if (p1Hp > p2Hp) {
    showResult('玩家1获胜！', `${GAME_CONFIG.MAX_ROUND}回合结束，玩家1剩余${p1Hp.toFixed(1)}心，玩家2剩余${p2Hp.toFixed(1)}心`);
  } else if (p2Hp > p1Hp) {
    showResult('玩家2获胜！', `${GAME_CONFIG.MAX_ROUND}回合结束，玩家2剩余${p2Hp.toFixed(1)}心，玩家1剩余${p1Hp.toFixed(1)}心`);
  } else {
    showResult('平局！', `${GAME_CONFIG.MAX_ROUND}回合结束，双方剩余血量相同`);
  }
}

function showResult(title, desc) {
  $resultText.textContent = title;
  $resultDesc.textContent = desc;
  $resultModal.style.display = 'flex';
}

// 重启游戏
$restartBtn.addEventListener('click', () => {
  gameState = {
    stage: 'roleSelect',
    currentOperatePlayer: 1,
    round: 1,
    players: {
      1: { selectedRoles: [], positions: {}, battleRoles: [] },
      2: { selectedRoles: [], positions: {}, battleRoles: [] }
    },
    firstPlayer: null,
    battleStage: 'waitingAction',
    pendingActions: { 1: null, 2: null },
    selectedRole: null,
    selectedSkill: null,
    selectedSkillIndex: null,
    selectingTarget: false,
    lastAttacker: null
  };
  $resultModal.style.display = 'none';
  $battleSection.style.display = 'none';
  $roundCounter.style.display = 'none';
  $roleSelectSection.style.display = 'block';
  $stageTip.textContent = '请玩家1选择参战角色';
  initRoleSelect();
});

// 初始化游戏
initRoleSelect();
  </script>
</body>
