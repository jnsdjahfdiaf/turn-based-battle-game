<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>回合制匹配对抗游戏</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 1400px;
      margin: 0 auto;
      background: #f0f2f5;
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    h1 {
      text-align: center;
      color: #333;
      margin-bottom: 20px;
      font-size: 2.5em;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
    }
    .stage-tip {
      text-align: center;
      font-size: 1.5em;
      font-weight: bold;
      color: #e74c3c;
      margin-bottom: 20px;
      padding: 15px;
      background: #ffebee;
      border-radius: 10px;
    }
    .round-counter {
      text-align: center;
      font-size: 1.2em;
      color: #666;
      margin-bottom: 15px;
      font-weight: bold;
    }
    .section {
      background: white;
      border-radius: 15px;
      padding: 25px;
      margin-bottom: 20px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    .section h2 {
      color: #333;
      margin-bottom: 20px;
      font-size: 1.8em;
    }
    .role-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 20px;
      margin-bottom: 20px;
    }
    .role-card {
      background: white;
      border: 3px solid #e0e0e0;
      border-radius: 15px;
      padding: 15px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .role-card:hover:not(.disabled) {
      transform: translateY(-5px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.15);
    }
    .role-card.selected {
      border-color: #e74c3c;
      background: #ffebee;
    }
    .role-card.disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .role-avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      margin-bottom: 10px;
      object-fit: cover;
      border: 3px solid #ddd;
    }
    .role-name {
      font-weight: bold;
      font-size: 1.2em;
      color: #333;
      margin-bottom: 8px;
    }
    .hp-display {
      display: flex;
      justify-content: center;
      gap: 3px;
      margin: 8px 0;
    }
    .heart {
      width: 16px;
      height: 16px;
      background-size: contain;
    }
    .heart.full::before { content: '❤️'; }
    .heart.half::before { content: '💔'; }
    .heart.empty::before { content: '🖤'; }
    .energy-display {
      display: flex;
      justify-content: center;
      gap: 5px;
      margin: 8px 0;
    }
    .energy-orb {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #ddd;
      border: 2px solid #999;
    }
    .energy-orb.filled {
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      border-color: #f5576c;
      box-shadow: 0 0 10px rgba(245, 87, 108, 0.6);
    }
    .selected-roles {
      display: flex;
      justify-content: space-around;
      margin: 20px 0;
      font-size: 1.2em;
    }
    .btn {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 15px 40px;
      font-size: 1.2em;
      border-radius: 30px;
      cursor: pointer;
      transition: all 0.3s ease;
      display: block;
      margin: 20px auto;
    }
    .btn:hover:not(:disabled) {
      transform: scale(1.05);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
    }
    .btn:disabled {
      background: #bdc3c7;
      cursor: not-allowed;
    }
    .position-area {
      display: flex;
      justify-content: space-around;
      gap: 30px;
    }
    .player-position {
      flex: 1;
      background: #f8f9fa;
      padding: 20px;
      border-radius: 15px;
    }
    .player-position h3 {
      text-align: center;
      margin-bottom: 15px;
      color: #555;
    }
    .position-slot {
      background: white;
      border: 2px dashed #ddd;
      border-radius: 10px;
      padding: 20px;
      margin: 10px 0;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      min-height: 100px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .position-slot:hover {
      border-color: #667eea;
      background: #f0f4ff;
    }
    .position-slot.filled {
      border-style: solid;
      border-color: #667eea;
    }
    .battle-field {
      display: grid;
      grid-template-columns: 1fr 200px 1fr;
      gap: 20px;
      align-items: start;
    }
    .player-side {
      background: #f8f9fa;
      padding: 20px;
      border-radius: 15px;
    }
    .player-side h3 {
      text-align: center;
      margin-bottom: 15px;
      color: #555;
    }
    .role-cards {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    .battle-role-card {
      background: white;
      border: 3px solid #e0e0e0;
      border-radius: 12px;
      padding: 15px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
    }
    .battle-role-card:hover:not(.dead) {
      transform: scale(1.02);
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }
    .battle-role-card.selected {
      border-color: #f39c12;
      box-shadow: 0 0 20px rgba(243, 156, 18, 0.4);
    }
    .battle-role-card.targetable {
      border-color: #e74c3c;
      animation: pulse 1s infinite;
    }
    .battle-role-card.dead {
      opacity: 0.4;
      filter: grayscale(1);
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.4); }
      50% { box-shadow: 0 0 0 10px rgba(231, 76, 60, 0); }
    }
    .position-tag {
      position: absolute;
      top: 5px;
      right: 5px;
      background: #667eea;
      color: white;
      padding: 3px 8px;
      border-radius: 5px;
      font-size: 0.8em;
    }
    .skill-area {
      background: #fff;
      padding: 20px;
      border-radius: 15px;
      text-align: center;
    }
    .current-tip {
      font-size: 1.2em;
      font-weight: bold;
      color: #333;
      margin-bottom: 15px;
    }
    .tip {
      color: #e74c3c;
      font-weight: bold;
      margin: 10px 0;
    }
    .skill-grid {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .skill-card {
      background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
      border: 2px solid #f39c12;
      border-radius: 10px;
      padding: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .skill-card.ultimate {
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      border-color: #f5576c;
    }
    .skill-card:hover:not(.disabled) {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }
    .skill-card.disabled {
      opacity: 0.5;
      cursor: not-allowed;
      filter: grayscale(0.5);
    }
    .skill-name {
      font-weight: bold;
      color: #333;
      margin-bottom: 5px;
    }
    .skill-desc {
      font-size: 0.9em;
      color: #666;
    }
    .skill-cooldown {
      color: #e74c3c;
      font-size: 0.85em;
      margin-top: 5px;
    }
    .buff-list {
      display: flex;
      justify-content: center;
      gap: 5px;
      flex-wrap: wrap;
      margin-top: 8px;
    }
    .buff-tag {
      padding: 3px 8px;
      border-radius: 5px;
      font-size: 0.8em;
    }
    .buff-tag.buff {
      background: #d4edda;
      color: #155724;
    }
    .buff-tag.debuff {
      background: #f8d7da;
      color: #721c24;
    }
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .modal-content {
      background: white;
      padding: 40px;
      border-radius: 20px;
      text-align: center;
      max-width: 500px;
      animation: popIn 0.3s ease;
    }
    @keyframes popIn {
      from { transform: scale(0.8); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    .modal-content h2 {
      font-size: 2.5em;
      margin-bottom: 15px;
    }
    .modal-content p {
      font-size: 1.2em;
      color: #666;
      margin-bottom: 25px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>⚔️ 回合制匹配对抗游戏</h1>
    <!-- 阶段提示 -->
    <div id="stage-tip" class="stage-tip">请玩家1选择参战角色</div>
    <div id="round-counter" class="round-counter" style="display: none;">第 1 / 20 回合</div>    <!-- 选角区 -->
    <div id="role-select-section" class="section">
      <h2>可选角色</h2>
      <div style="text-align: center; margin-bottom: 15px;">
        <button id="switch-select-player" class="btn" style="display: inline-block; margin: 0 10px;">当前配置：玩家1</button>
        <span style="color: #666;">👉 点击切换要配置的玩家</span>
      </div>
      <div id="role-list" class="role-grid"></div>
      <div class="selected-roles">
        <div style="color: #e74c3c; font-weight: bold;">玩家1已选：<span id="player1-selected">0/3</span></div>
        <div style="color: #3498db; font-weight: bold;">玩家2已选：<span id="player2-selected">0/3</span></div>
      </div>
      <button id="confirm-roles" class="btn" disabled>确认选角</button>
    </div>

    <!-- 站位选择区 -->
    <div id="position-select-section" class="section" style="display: none;">
      <h2>安排站位（左/中/右）</h2>
      <div class="position-area">
        <div class="player-position" id="player1-position">
          <h3>玩家1 站位</h3>
          <div class="position-slot" data-position="left">左侧</div>
          <div class="position-slot" data-position="center">中路</div>
          <div class="position-slot" data-position="right">右侧</div>
        </div>
        <div class="player-position" id="player2-position">
          <h3>玩家2 站位</h3>
          <div class="position-slot" data-position="left">左侧</div>
          <div class="position-slot" data-position="center">中路</div>
          <div class="position-slot" data-position="right">右侧</div>
        </div>
      </div>
      <button id="confirm-positions" class="btn" disabled>确认站位</button>
    </div>

    <!-- 战斗区 -->
    <div id="battle-section" class="section" style="display: none;">
      <div class="battle-field">
        <div class="player-side" id="player2-side">
          <h3>玩家2</h3>
          <div class="role-cards"></div>
        </div>
        <div class="skill-area">
          <div id="current-player-tip" class="current-tip">当前回合：玩家1</div>
          <div id="skill-list" class="skill-grid"></div>
          <div id="target-select-tip" class="tip" style="display: none;">请选择技能目标</div>
        </div>
        <div class="player-side" id="player1-side">
          <h3>玩家1</h3>
          <div class="role-cards"></div>
        </div>
      </div>
      <button id="end-turn" class="btn" style="display: none;">结束回合</button>
    </div>

    <!-- 胜负弹窗 -->
    <div id="result-modal" class="modal" style="display: none;">
      <div class="modal-content">
        <h2 id="result-text">游戏结束</h2>
        <p id="result-desc"></p>
        <button id="restart-btn" class="btn">再来一局</button>
      </div>
    </div>
  </div>

  <script>
    // ==============================
    // 角色配置
    // ==============================
    const ROLE_LIST = [
      {

          },

        ]
      },
      {

          {

            energyCost: 0,
            energyGain: 2,
            targetType: 'enemy',
            effect: (target) => ({ 
              damage: 2, 
              buff: { id: 'poison', name: '中毒', type: 'debuff', duration: 3, description: '每回合受到1点伤害',
                onTurnEnd: (role) => { role.currentHp = Math.max(0, role.currentHp - 1); }
              }
            })
          },
          {

            cooldown: 0,

        ]
      },
      {
        id: 'tank',
        name: '骑士',
        avatar: 'https://api.dicebear.com/7.x/adventurer/svg?seed=tank',
        maxHp: 10,
        maxEnergy: 3,
        skills: [
          {
            name: '盾击',
            description: '对敌人造成1点伤害，获得1点充能',
            cooldown: 0,
            energyCost: 0,
            energyGain: 1,
            targetType: 'enemy',
            effect: (target) => ({ damage: 1 })
          },
          {

          }

      },
      {
        id: 'archer',
        name: '弓箭手',
        avatar: 'https://api.dicebear.com/7.x/adventurer/svg?seed=archer',
        maxHp: 6,
        maxEnergy: 4,
        skills: [
          {
            name: '射击',

            targetType: 'enemy',
            effect: (target) => ({ damage: 2 })
          },
          {
            name: '连射',
            description: '对敌人造成3点伤害，获得2点充能',
            cooldown: 2,
            energyCost: 0,
            energyGain: 2,
            targetType: 'enemy',
            effect: (target) => ({ damage: 3 })
          },
          {
            name: '箭雨',
            description: '【大招】对所有敌人造成4点伤害',
            cooldown: 0,
            energyCost: 4,
            isUltimate: true,
            targetType: 'allEnemy',
            effect: (target) => ({ damage: 4 })
          }
        ]
      }
    ];

    // ==============================
    // 游戏规则配置
    // ==============================
    const GAME_CONFIG = {
      MAX_ROUND: 20,
      ROLES_PER_PLAYER: 3
    };

    // 游戏全局状态
    let gameState = {
      stage: 'roleSelect',
      currentPlayer: 1,
      round: 1,
      players: {
        1: { selectedRoles: [], positions: {}, battleRoles: [] },
        2: { selectedRoles: [], positions: {}, battleRoles: [] }
      },
      firstPlayer: null,
      selectedRole: null,
      selectedSkill: null,
      selectedSkillIndex: null,
      selectingTarget: false,
      skillUsedThisTurn: false
    };

    // DOM元素缓存
    const $ = id => document.getElementById(id);
    const $stageTip = $('stage-tip');
    const $roundCounter = $('round-counter');
    const $roleSelectSection = $('role-select-section');
    const $roleList = $('role-list');
    const $player1Selected = $('player1-selected');
    const $player2Selected = $('player2-selected');
    const $confirmRolesBtn = $('confirm-roles');
    const $positionSelectSection = $('position-select-section');
    const $player1Position = $('player1-position');
    const $player2Position = $('player2-position');
    const $confirmPositionsBtn = $('confirm-positions');
    const $battleSection = $('battle-section');
    const $player1Side = $('player1-side');
    const $player2Side = $('player2-side');
    const $currentPlayerTip = $('current-player-tip');
    const $skillList = $('skill-list');
    const $targetSelectTip = $('target-select-tip');
    const $endTurnBtn = $('end-turn');
    const $resultModal = $('result-modal');
    const $resultText = $('result-text');
    const $resultDesc = $('result-desc');
    const $restartBtn = $('restart-btn');
    const $switchSelectPlayer = $('switch-select-player');

    // ==============================
    // 工具函数
    // ==============================
    function renderHp(hp, maxHp) {
      let html = '';
      const full = Math.floor(hp);
      const half = hp % 1 >= 0.5;
      const empty = Math.floor(maxHp) - full - (half ? 1 : 0);
      html += '<span style="color:#e74c3c;">❤️</span>'.repeat(full);
      if (half) html += '<span style="color:#e74c3c;">💔</span>';
      html += '<span style="color:#999;">🖤</span>'.repeat(empty);
      return html;
    }

    function renderEnergy(energy, maxEnergy) {
      let html = '<div class="energy-display">';
      for (let i = 0; i < maxEnergy; i++) {
        html += `<div class="energy-orb ${i < energy ? 'filled' : ''}"></div>`;
      }
      html += '</div>';
      return html;
    }

    function renderBuffs(buffs) {
      if (!buffs || !buffs.length) return '';
      return buffs.map(b => `
        <div class="buff-tag ${b.type}" title="${b.description} (剩余${b.duration}回合)">
          ${b.name}${b.duration>0?`(${b.duration})`:''}
        </div>
      `).join('');
    }

    function isPlayerAllDead(playerId) {
      return gameState.players[playerId].battleRoles.every(r => r.currentHp <= 0);
    }

    function getPlayerTotalHp(playerId) {
      return gameState.players[playerId].battleRoles.reduce((sum, r) => sum + Math.max(0, r.currentHp), 0);
    }

    // ==============================
    // 选角阶段逻辑
    // ==============================
    function initRoleSelect() {
      $roleList.innerHTML = '';
      ROLE_LIST.forEach(role => {
        const card = document.createElement('div');
        card.className = 'role-card';
        card.dataset.roleId = role.id;
        card.innerHTML = `
          <img src="${role.avatar}" alt="${role.name}" class="role-avatar">
          <div class="role-name">${role.name}</div>
          <div class="hp-display" style="margin:8px 0;">${renderHp(role.maxHp, role.maxHp)}</div>
          <div style="font-size:11px; color:#666; margin-top:5px; line-height:1.4;">
            ${role.skills.map((s, i) => `<div>${i+1}. ${s.name}</div>`).join('')}
          </div>
        `;
        card.addEventListener('click', () => handleRoleSelect(role.id));
        $roleList.appendChild(card);
      });
      $switchSelectPlayer.textContent = `当前配置：玩家${gameState.currentPlayer}`;
      updateSelectedRolesTip();
      updateRoleCardStatus();
    }

    $switchSelectPlayer.addEventListener('click', () => {
      gameState.currentPlayer = gameState.currentPlayer === 1 ? 2 : 1;
      $switchSelectPlayer.textContent = `当前配置：玩家${gameState.currentPlayer}`;
      updateRoleCardStatus();
      $stageTip.textContent = `请玩家${gameState.currentPlayer}选择参战角色`;
    });

    function handleRoleSelect(roleId) {
      const curPlayer = gameState.currentPlayer;
      const selected = gameState.players[curPlayer].selectedRoles;
      const otherPlayer = curPlayer === 1 ? 2 : 1;
      if (selected.includes(roleId)) {
        selected.splice(selected.indexOf(roleId), 1);
      } else {
        if (gameState.players[otherPlayer].selectedRoles.includes(roleId)) {
          alert('该角色已被对方选择，请选其他角色');
          return;
        }
        if (selected.length >= GAME_CONFIG.ROLES_PER_PLAYER) {
          alert(`玩家${curPlayer}已选满${GAME_CONFIG.ROLES_PER_PLAYER}个角色，可切换到另一个玩家选择，或取消已选重新选`);
          return;
        }
        selected.push(roleId);
      }
      updateSelectedRolesTip();
      updateRoleCardStatus();
      const p1Done = gameState.players[1].selectedRoles.length === GAME_CONFIG.ROLES_PER_PLAYER;
      const p2Done = gameState.players[2].selectedRoles.length === GAME_CONFIG.ROLES_PER_PLAYER;
      $confirmRolesBtn.disabled = !(p1Done && p2Done);
    }

    function updateSelectedRolesTip() {
      $player1Selected.textContent = `${gameState.players[1].selectedRoles.length}/${GAME_CONFIG.ROLES_PER_PLAYER}`;
      $player2Selected.textContent = `${gameState.players[2].selectedRoles.length}/${GAME_CONFIG.ROLES_PER_PLAYER}`;
    }

    function updateRoleCardStatus() {
      document.querySelectorAll('.role-card').forEach(card => {
        const roleId = card.dataset.roleId;
        const p1Sel = gameState.players[1].selectedRoles.includes(roleId);
        const p2Sel = gameState.players[2].selectedRoles.includes(roleId);
        const isSelectedByCurPlayer = gameState.currentPlayer === 1 ? p1Sel : p2Sel;
        const isSelectedByOther = gameState.currentPlayer === 1 ? p2Sel : p1Sel;
        card.classList.toggle('selected', isSelectedByCurPlayer);
        if (isSelectedByOther) {
          card.style.borderColor = '#3498db';
          card.style.background = '#e3f2fd';
          card.classList.add('disabled');
        } else if (isSelectedByCurPlayer) {
          card.style.borderColor = '#e74c3c';
          card.style.background = '#ffebee';
          card.classList.remove('disabled');
        } else {
          card.style.borderColor = '#e0e0e0';
          card.style.background = 'white';
          card.classList.remove('disabled');
        }
      });
    }

    $confirmRolesBtn.addEventListener('click', () => {
      gameState.stage = 'positionSelect';
      $roleSelectSection.style.display = 'none';
      $positionSelectSection.style.display = 'block';
      gameState.currentPlayer = 1;
      $stageTip.textContent = '请玩家1安排角色站位';
      initPositionSelect();
    });

    // ==============================
    // 站位选择阶段
    // ==============================
    function initPositionSelect() {
      renderPositionSlots(1);
      renderPositionSlots(2);
    }

    function renderPositionSlots(playerId) {
      const container = playerId === 1 ? $player1Position : $player2Position;
      const slots = container.querySelectorAll('.position-slot');
      const selectedRoles = gameState.players[playerId].selectedRoles;
      slots.forEach(slot => {
        const pos = slot.dataset.position;
        const filledRoleId = gameState.players[playerId].positions[pos];
        if (filledRoleId) {
          const role = ROLE_LIST.find(r => r.id === filledRoleId);
          slot.innerHTML = `<img src="${role.avatar}" style="width:50px; border-radius:50%;"><div style="font-weight:bold;">${role.name}</div>`;
          slot.classList.add('filled');
        } else {
          const posText = pos === 'left' ? '左侧' : pos === 'center' ? '中路' : '右侧';
          slot.innerHTML = `<div style="color:#999;">${posText}</div>`;
          slot.classList.remove('filled');
        }
        slot.onclick = playerId === gameState.currentPlayer ? () => handlePositionSelect(playerId, pos) : null;
      });
      const p1Done = Object.keys(gameState.players[1].positions).length === GAME_CONFIG.ROLES_PER_PLAYER;
      const p2Done = Object.keys(gameState.players[2].positions).length === GAME_CONFIG.ROLES_PER_PLAYER;
      $confirmPositionsBtn.disabled = !(p1Done && p2Done);
      if (p1Done && gameState.currentPlayer === 1) {
        gameState.currentPlayer = 2;
        $stageTip.textContent = '请玩家2安排角色站位';
        renderPositionSlots(2);
      }
    }

    function handlePositionSelect(playerId, pos) {
      const positions = gameState.players[playerId].positions;
      if (positions[pos]) {
        delete positions[pos];
      } else {
        const unassigned = gameState.players[playerId].selectedRoles.filter(id => !Object.values(positions).includes(id));
        if (unassigned.length) positions[pos] = unassigned[0];
      }
      renderPositionSlots(playerId);
    }

    $confirmPositionsBtn.addEventListener('click', () => {
      initBattleRoles();
      rollInitiative();
      gameState.stage = 'battle';
      $positionSelectSection.style.display = 'none';
      $battleSection.style.display = 'block';
      $roundCounter.style.display = 'block';
      $roundCounter.textContent = `第 ${gameState.round} / ${GAME_CONFIG.MAX_ROUND} 回合`;
      $stageTip.textContent = `战斗开始！先手为玩家${gameState.firstPlayer}`;
      gameState.currentPlayer = gameState.firstPlayer;
      gameState.skillUsedThisTurn = false;
      renderBattleField();
      renderSkillList();
    });

    // ==============================
    // 战斗阶段逻辑
    // ==============================
    function initBattleRoles() {
      [1,2].forEach(playerId => {
        const positions = gameState.players[playerId].positions;
        gameState.players[playerId].battleRoles = Object.entries(positions).map(([pos, roleId]) => {
          const template = ROLE_LIST.find(r => r.id === roleId);
          return {
            ...template,
            currentHp: template.maxHp,
            energy: 0,
            position: pos,
            buffs: [],
            skillCooldowns: template.skills.map(() => 0),
            shield: 0
          };
        });
      });
    }

    function rollInitiative() {
      const p1Roll = Math.floor(Math.random()*100) + 1;
      const p2Roll = Math.floor(Math.random()*100) + 1;
      gameState.firstPlayer = p1Roll >= p2Roll ? 1 : 2;
      alert(`先后手判定：玩家1 ${p1Roll} vs 玩家2 ${p2Roll}，玩家${gameState.firstPlayer}先手！`);
    }

    function renderBattleField() {
      renderPlayerBattleRoles(1, $player1Side.querySelector('.role-cards'));
      renderPlayerBattleRoles(2, $player2Side.querySelector('.role-cards'));
      $currentPlayerTip.textContent = `当前回合：玩家${gameState.currentPlayer}`;
      checkGameEnd();
    }

    function renderPlayerBattleRoles(playerId, container) {
      const roles = gameState.players[playerId].battleRoles;
      container.innerHTML = '';
      roles.forEach(role => {
        const card = document.createElement('div');
        card.className = `battle-role-card ${role.currentHp <=0 ? 'dead' : ''}`;
        card.dataset.roleId = role.id;
        card.dataset.playerId = playerId;
        const posText = role.position === 'left' ? '左' : role.position === 'center' ? '中' : '右';
        card.innerHTML = `
          <div class="position-tag">${posText}</div>
          <img src="${role.avatar}" class="role-avatar">
          <div class="role-name">${role.name}</div>
          <div style="margin:8px 0;">${renderHp(role.currentHp, role.maxHp)}</div>
          ${renderEnergy(role.energy, role.maxEnergy)}
          ${role.shield > 0 ? `<div style="font-size:12px; color:#3498db; font-weight:bold;">🛡️ ${role.shield.toFixed(1)}</div>` : ''}
          <div class="buff-list">${renderBuffs(role.buffs)}</div>
          ${role.skillCooldowns.some(cd=>cd>0) ? `<div style="font-size:10px; color:#666; margin-top:5px;">冷却：${role.skillCooldowns.map((cd,idx)=>cd>0?`技能${idx+1}:${cd}`:'').filter(Boolean).join(' ')}</div>` : ''}
        `;
        if (gameState.selectingTarget) {
          const targetable = checkTargetable(gameState.selectedSkill.targetType, playerId, role);
          if (targetable) {
            card.classList.add('targetable');
            card.addEventListener('click', () => handleTargetSelect(role, playerId));
          }
        }
        if (!gameState.selectingTarget && playerId === gameState.currentPlayer && role.currentHp > 0 && !gameState.skillUsedThisTurn) {
          card.addEventListener('click', () => handleOperateRoleSelect(role));
        }
        if (gameState.selectedRole && gameState.selectedRole.id === role.id) {
          card.classList.add('selected');
        }
        container.appendChild(card);
      });
    }

    function handleOperateRoleSelect(role) {
      gameState.selectedRole = role;
      renderBattleField();
      renderSkillList();
    }

    function renderSkillList() {
      $skillList.innerHTML = '';
      if (!gameState.selectedRole) {
        $skillList.innerHTML = '<div style="padding:20px; color:#999;">请先选择你要操作的角色</div>';
        return;
      }
      if (gameState.skillUsedThisTurn) {
        $skillList.innerHTML = '<div style="padding:20px; color:#999;">本回合已使用技能，请点击"结束回合"</div>';
        return;
      }
      gameState.selectedRole.skills.forEach((skill, idx) => {
        const cd = gameState.selectedRole.skillCooldowns[idx];
        const canUse = cd === 0 && (skill.energyCost === 0 || gameState.selectedRole.energy >= skill.energyCost);
        const card = document.createElement('div');
        card.className = `skill-card ${skill.isUltimate ? 'ultimate' : ''} ${!canUse ? 'disabled' : ''}`;
        let cooldownText = cd > 0 ? `<div class="skill-cooldown">冷却中：${cd}回合</div>` : '';
        let energyText = skill.energyCost > 0 ? `<div style="font-size:0.85em; color:#f5576c; margin-top:5px;">需要${skill.energyCost}点充能</div>` : '';
        let gainText = skill.energyGain > 0 ? `<div style="font-size:0.85em; color:#9b59b6; margin-top:5px;">获得${skill.energyGain}点充能</div>` : '';
        card.innerHTML = `
          <div class="skill-name">${skill.name}</div>
          <div class="skill-desc">${skill.description}</div>
          ${cooldownText}${energyText}${gainText}
        `;
        if (canUse) card.addEventListener('click', () => handleSkillSelect(skill, idx));
        $skillList.appendChild(card);
      });
    }

    function handleSkillSelect(skill, idx) {
      gameState.selectedSkill = skill;
      gameState.selectedSkillIndex = idx;
      gameState.selectingTarget = true;
      $targetSelectTip.style.display = 'block';
      $targetSelectTip.textContent = `请选择技能「${skill.name}」的目标`;
      renderBattleField();
    }

    function checkTargetable(targetType, targetPlayerId, role) {
      const curPlayer = gameState.currentPlayer;
      switch(targetType) {
        case 'enemy': return targetPlayerId !== curPlayer && role.currentHp>0;
        case 'ally': return targetPlayerId === curPlayer && role.currentHp>0;
        case 'self': return targetPlayerId === curPlayer && role.id === gameState.selectedRole.id;
        case 'allEnemy': return targetPlayerId !== curPlayer && role.currentHp>0;
        case 'allAlly': return targetPlayerId === curPlayer && role.currentHp>0;
        default: return false;
      }
    }

    function handleTargetSelect(target, targetPlayerId) {
      const skill = gameState.selectedSkill;
      const caster = gameState.selectedRole;
      let targets = [];
      if (skill.targetType === 'allEnemy') {
        targets = gameState.players[targetPlayerId === 1 ? 2 : 1].battleRoles.filter(r => r.currentHp>0);
      } else if (skill.targetType === 'allAlly') {
        targets = gameState.players[gameState.currentPlayer].battleRoles.filter(r => r.currentHp>0);
      } else {
        targets = [target];
      }
      let messages = [];
      targets.forEach(t => {
        const effect = skill.effect(t, caster);
        let damage = effect.damage || 0;
        if (damage > 0) {
          if (t.shield > 0) {
            const absorb = Math.min(t.shield, damage);
            t.shield -= absorb;
            damage -= absorb;
            if (absorb > 0) messages.push(`${t.name}的护盾吸收了${absorb.toFixed(1)}点伤害`);
          }
          if (damage > 0) {
            t.currentHp = Math.max(0, t.currentHp - damage);
            messages.push(`对${t.name}造成${damage.toFixed(1)}点伤害！`);
            if (t.currentHp > 0) {
              addEnergy(t, 1);
              messages.push(`${t.name}受击获得1点充能`);
            }
          }
        } else if (damage < 0) {
          const heal = -damage;
          const oldHp = t.currentHp;
          t.currentHp = Math.min(t.maxHp, t.currentHp + heal);
          const actualHeal = t.currentHp - oldHp;
          if (actualHeal > 0) messages.push(`为${t.name}恢复${actualHeal.toFixed(1)}心血量！`);
        }
        if (effect.buff) {
          const buffs = Array.isArray(effect.buff) ? effect.buff : [effect.buff];
          buffs.forEach(buffTemp => {
            const buff = {...buffTemp};
            if (buff.effect) buff.effect(t, buff.extraData);
            if (buff.duration > 0) {
              const existing = t.buffs.find(b => b.id === buff.id);
              existing ? existing.duration = buff.duration : t.buffs.push(buff);
              messages.push(`给${t.name}附加「${buff.name}」，持续${buff.duration}回合！`);
            }
          });
        }
      });
      if (skill.energyCost > 0) {
        caster.energy -= skill.energyCost;
        messages.push(`${caster.name}消耗${skill.energyCost}点充能`);
      }
      if (skill.energyGain > 0) {
        addEnergy(caster, skill.energyGain);
        messages.push(`${caster.name}获得${skill.energyGain}点充能`);
      }
      caster.skillCooldowns[gameState.selectedSkillIndex] = skill.cooldown;
      gameState.skillUsedThisTurn = true;
      if (messages.length > 0) alert(messages.join('\n'));
      endSkillCast();
    }

    function addEnergy(role, amount) {
      role.energy = Math.min(role.maxEnergy, role.energy + amount);
    }

    function endSkillCast() {
      gameState.selectingTarget = false;
      gameState.selectedSkill = null;
      $targetSelectTip.style.display = 'none';
      renderBattleField();
      renderSkillList();
      $endTurnBtn.style.display = 'block';
    }

    $endTurnBtn.addEventListener('click', () => {
      const roles = gameState.players[gameState.currentPlayer].battleRoles;
      roles.forEach(role => {
        role.buffs.forEach(buff => {
          if (buff.onTurnEnd) buff.onTurnEnd(role);
          buff.duration--;
        });
        role.buffs = role.buffs.filter(b => b.duration > 0);
        role.skillCooldowns = role.skillCooldowns.map(cd => Math.max(0, cd-1));
      });
      if (checkGameEnd()) return;
      gameState.currentPlayer = gameState.currentPlayer === 1 ? 2 : 1;
      if (gameState.currentPlayer === gameState.firstPlayer) {
        gameState.round++;
        $roundCounter.textContent = `第 ${gameState.round} / ${GAME_CONFIG.MAX_ROUND} 回合`;
        if (gameState.round > GAME_CONFIG.MAX_ROUND) return handleRoundLimitEnd();
      }
      gameState.selectedRole = null;
      gameState.skillUsedThisTurn = false;
      $endTurnBtn.style.display = 'none';
      $stageTip.textContent = `玩家${gameState.currentPlayer}的回合`;
      renderBattleField();
      renderSkillList();
    });

    function checkGameEnd() {
      const p1Dead = isPlayerAllDead(1);
      const p2Dead = isPlayerAllDead(2);
      if (p1Dead && p2Dead) {
        showResult('平局！', '双方角色全部阵亡');
        return true;
      } else if (p1Dead) {
        showResult('玩家2获胜！', '玩家1所有角色被击败');
        return true;
      } else if (p2Dead) {
        showResult('玩家1获胜！', '玩家2所有角色被击败');
        return true;
      }
      return false;
    }

    function handleRoundLimitEnd() {
      const p1Hp = getPlayerTotalHp(1);
      const p2Hp = getPlayerTotalHp(2);
      if (p1Hp > p2Hp) {
        showResult('玩家1获胜！', `20回合结束，玩家1剩余${p1Hp.toFixed(1)}心，玩家2剩余${p2Hp.toFixed(1)}心`);
      } else if (p2Hp > p1Hp) {
        showResult('玩家2获胜！', `20回合结束，玩家2剩余${p2Hp.toFixed(1)}心，玩家1剩余${p1Hp.toFixed(1)}心`);
      } else {
        showResult('平局！', '20回合结束，双方剩余血量相同');
      }
    }

    function showResult(title, desc) {
      $resultText.textContent = title;
      $resultDesc.textContent = desc;
      $resultModal.style.display = 'flex';
    }

    $restartBtn.addEventListener('click', () => {
      gameState = {
        stage: 'roleSelect', currentPlayer: 1, round: 1,
        players: {1:{selectedRoles:[],positions:{},battleRoles:[]},2:{selectedRoles:[],positions:{},battleRoles:[]}},
        firstPlayer: null, selectedRole: null, selectedSkill: null, selectedSkillIndex: null, selectingTarget: false,
        skillUsedThisTurn: false
      };
      $resultModal.style.display = 'none';
      $battleSection.style.display = 'none';
      $roundCounter.style.display = 'none';
      $roleSelectSection.style.display = 'block';
      $stageTip.textContent = '请玩家1选择参战角色';
      initRoleSelect();
    });

    initRoleSelect();
  </script>
</body>
</html>
